<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ad Campaign - AfriAd</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-100 p-6 md:p-12 font-sans text-slate-800">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
        <a href="dashboard.html" class="text-sm font-semibold text-blue-600 hover:underline">← Back to Dashboard</a>
        <h1 class="text-2xl font-black text-slate-900 mt-4 mb-6">Launch a New Campaign</h1>

        <form class="space-y-6">
            <!-- 1. Select Ad Type -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">1. Choose Advertisement Type</label>
                <select id="adType" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-hidden focus:ring-2 focus:ring-blue-500">
                    <option value="classified">Classified Listing (7,500 UGX / Week)</option>
                    <option value="banner_cpc">Website Banner Ad (112 UGX / Click)</option>
                    <option value="video_cpv" selected>Watch & Earn Video (150 UGX / View)</option>
                    <option value="social_flat">Social Media Repost (37,500 UGX / Flat)</option>
                </select>
            </div>

            <!-- 2. Campaign Details -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">2. Campaign Title</label>
                <input type="text" placeholder="e.g., Luxury Shoes Clearance Sale" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-hidden focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- 3. Target Country -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">3. Target Audience Location</label>
                <select class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-medium outline-hidden focus:ring-2 focus:ring-blue-500">
                    <option>Uganda (Kampala, Entebbe, Jinja)</option>
                    <option>Kenya (Nairobi, Mombasa)</option>
                    <option>Tanzania (Dar es Salaam, Arusha)</option>
                    <option>Rwanda (Kigali)</option>
                    <option>South Africa (Johannesburg, Cape Town)</option>
                </select>
            </div>

            <!-- 4. Media Upload Link -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">4. Ad Media Link (Image/Video URL)</label>
                <input type="url" placeholder="https://yourimagebucket.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-hidden focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- 5. Destination Link -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">5. Where should users go when they click?</label>
                <input type="url" placeholder="https://wa.me or website link" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-hidden focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Budget Estimator Box -->
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <h3 class="text-sm font-bold text-blue-900 uppercase tracking-wider">Estimated Budget Breakdown</h3>
                <div class="flex justify-between items-center mt-3">
                    <span class="text-sm text-slate-600">Total Units (Clicks/Views):</span>
                    <input type="number" id="unitsCount" value="100" class="w-24 bg-white border border-slate-200 rounded-lg p-1.5 text-center font-bold">
                </div>
                <div class="border-t border-blue-200/60 my-4"></div>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-slate-900">Total Campaign Cost:</span>
                    <span class="text-xl font-black text-blue-600" id="totalCostDisplay">15,000 UGX</span>
                </div>
            </div>

            <button type="button" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md hover:bg-blue-700 transition">
                Submit Campaign for Review
            </button>
        </form>
    </div>

    <!-- Live Budget Calculation Logic Engine -->
    <script>
        const unitPrices = { classified: 7500, banner_cpc: 112, video_cpv: 150, social_flat: 37500 };
        const adTypeSelect = document.getElementById('adType');
        const unitsInput = document.getElementById('unitsCount');
        const costDisplay = document.getElementById('totalCostDisplay');

        function calculateCost() {
            const type = adTypeSelect.value;
            let units = parseInt(unitsInput.value) || 0;
            
            // Classified listings and social media posts are flat rates per unit pack
            if (type === 'classified' || type === 'social_flat') {
                unitsInput.disabled = true;
                unitsInput.value = 1;
                units = 1;
            } else {
                unitsInput.disabled = false;
            }

            const total = unitPrices[type] * units;
            costDisplay.innerText = total.toLocaleString() + " UGX";
        }

        adTypeSelect.addEventListener('change', calculateCost);
        unitsInput.addEventListener('input', calculateCost);
    </script>
</body>
</html>
