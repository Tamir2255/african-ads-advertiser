<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertiser Dashboard - AfriAd</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600">AfriAd Dashboard</h1>
            <div class="flex items-center space-x-4">
                <span id="welcome-user-text" class="text-gray-700 font-medium">Loading...</span>
                <button onclick="handleLogOut()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Log Out
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10 space-y-8">
        
        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Your Wallet Balances</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div class="bg-blue-50 p-4 rounded text-center">
                    <span class="text-xs text-gray-500 block uppercase">UGX</span>
                    <span id="bal-ugx" class="text-xl font-bold text-blue-800">0.00</span>
                </div>
                <div class="bg-blue-50 p-4 rounded text-center">
                    <span class="text-xs text-gray-500 block uppercase">KES</span>
                    <span id="bal-kes" class="text-xl font-bold text-blue-800">0.00</span>
                </div>
                <div class="bg-blue-50 p-4 rounded text-center">
                    <span class="text-xs text-gray-500 block uppercase">TZS</span>
                    <span id="bal-tzs" class="text-xl font-bold text-blue-800">0.00</span>
                </div>
                <div class="bg-blue-50 p-4 rounded text-center">
                    <span class="text-xs text-gray-500 block uppercase">RWF</span>
                    <span id="bal-rwf" class="text-xl font-bold text-blue-800">0.00</span>
                </div>
                <div class="bg-blue-50 p-4 rounded text-center">
                    <span class="text-xs text-gray-500 block uppercase">ZAR</span>
                    <span id="bal-zar" class="text-xl font-bold text-blue-800">0.00</span>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Launch New Campaign</h2>
                <form id="campaign-upload-form" class="space-y-4" onsubmit="handleCampaignSubmit(event)">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Campaign Type</label>
                        <select id="form-campaign-type" class="w-full p-2 border rounded">
                            <option value="classified">Classified Ad</option>
                            <option value="banner_cpc">Banner (CPC)</option>
                            <option value="video_ad">Video Ad (CPV)</option>
                            <option value="social_repost">Social Repost</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Title</label>
                        <input type="text" id="form-title" placeholder="Campaign Title" required class="w-full p-2 border rounded">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Target Country</label>
                            <select id="form-country" class="w-full p-2 border rounded">
                                <option value="Uganda">Uganda</option>
                                <option value="Kenya">Kenya</option>
                                <option value="Tanzania">Tanzania</option>
                                <option value="Rwanda">Rwanda</option>
                                <option value="South Africa">South Africa</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">Currency</label>
                            <select id="form-currency" class="w-full p-2 border rounded">
                                <option value="UGX">UGX</option>
                                <option value="KES">KES</option>
                                <option value="TZS">TZS</option>
                                <option value="RWF">RWF</option>
                                <option value="ZAR">ZAR</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Ad Graphic / Video</label>
                        <input type="file" id="form-media-file" class="w-full p-1 border rounded">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Target Units (e.g. clicks or views)</label>
                        <input type="number" id="form-units" value="100" min="1" required class="w-full p-2 border rounded">
                    </div>

                    <button type="submit" class="w-full bg-orange-500 text-white p-3 rounded font-bold hover:bg-orange-600">
                        Create & Pay Campaign
                    </button>
                </form>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-bold mb-4 text-gray-800">Deposit Funds</h2>
                    <div class="space-y-3">
                        <input type="number" id="deposit-amount" placeholder="Amount" class="w-full p-2 border rounded">
                        <select id="deposit-currency" class="w-full p-2 border rounded">
                            <option value="UGX">UGX (Uganda)</option>
                            <option value="KES">KES (Kenya)</option>
                            <option value="TZS">TZS (Tanzania)</option>
                            <option value="RWF">RWF (Rwanda)</option>
                            <option value="ZAR">ZAR (South Africa)</option>
                        </select>
                        <input type="text" id="deposit-phone" placeholder="Phone Number (e.g. 25677...)" class="w-full p-2 border rounded">
                        <button onclick="handleDepositSubmit()" class="w-full bg-green-500 text-white p-2 rounded font-bold hover:bg-green-600">
                            Send Deposit Request
                        </button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-lg font-bold mb-3 text-gray-800">Your Active Campaigns</h2>
                    <div id="active-campaign-list" class="space-y-2">
                        <p class="text-sm text-gray-500">None yet.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const storedUser = localStorage.getItem('user');

            if (!token || !storedUser) {
                alert("Please log in first.");
                window.location.href = 'index.html';
                return;
            }

            currentUser = JSON.parse(storedUser);
            document.getElementById('welcome-user-text').innerText = `Welcome, ${currentUser.username}`;
            
            document.getElementById('bal-ugx').innerText = parseFloat(currentUser.ugx_balance || 0).toLocaleString();
            document.getElementById('bal-kes').innerText = parseFloat(currentUser.kes_balance || 0).toLocaleString();
            document.getElementById('bal-tzs').innerText = parseFloat(currentUser.tzs_balance || 0).toLocaleString();
            document.getElementById('bal-rwf').innerText = parseFloat(currentUser.rwf_balance || 0).toLocaleString();
            document.getElementById('bal-zar').innerText = parseFloat(currentUser.zar_balance || 0).toLocaleString();
        });

        function handleLogOut() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        async function handleCampaignSubmit(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append('advertiserId', currentUser.id);
            formData.append('campaignType', document.getElementById('form-campaign-type').value);
            formData.append('title', document.getElementById('form-title').value);
            formData.append('targetCountry', document.getElementById('form-country').value);
            formData.append('currency', document.getElementById('form-currency').value);
            formData.append('totalUnits', document.getElementById('form-units').value);

            const fileField = document.getElementById('form-media-file');
            if (fileField.files[0]) {
                formData.append('mediaFile', fileField.files[0]);
            }

            try {
                const response = await fetch(`/api/campaigns/create`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: formData
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Campaign Created Successfully!');
                    
                    const cur = data.campaign.currency.toLowerCase();
                    const targetEl = document.getElementById(`bal-${cur}`);
                    if(targetEl) {
                        targetEl.innerText = parseFloat(data.newBalance).toLocaleString();
                        currentUser[`${cur}_balance`] = data.newBalance;
                        localStorage.setItem('user', JSON.stringify(currentUser));
                    }

                    const list = document.getElementById('active-campaign-list');
                    const item = document.createElement('div');
                    item.className = "p-2 bg-gray-50 border rounded flex justify-between items-center text-sm";
                    item.innerHTML = `
                        <span><strong>${data.campaign.title}</strong> (${data.campaign.total_units} units)</span>
                        <span class="text-xs bg-yellow-200 px-2 py-0.5 rounded text-yellow-800">PENDING</span>
                    `;
                    list.prepend(item);
                } else {
                    alert(data.error || 'Failed to launch campaign.');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error.');
            }
        }

        async function handleDepositSubmit() {
            const amount = document.getElementById('deposit-amount').value;
            const currency = document.getElementById('deposit-currency').value;
            const phone = document.getElementById('deposit-phone').value;

            if(!amount || !phone) {
                alert('Please enter details.');
                return;
            }

            try {
                const response = await fetch(`/api/payments/deposit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify({ amount, currency, phoneNumber: phone, network: 'MTN' })
                });

                const data = await response.json();
                if (response.ok) {
                    alert(data.message + "\nTransaction reference ID: " + data.transactionId);
                } else {
                    alert(data.error);
                }
            } catch(err) {
                alert('Request failed.');
            }
        }
    </script>
</body>
</html>
